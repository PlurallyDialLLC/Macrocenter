{% extends "base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<section class="admin-form">

    <h1>Edit Product</h1>

    <form method="POST">

        <input type="text" name="name"
               value="{{ product.name }}"
               placeholder="Product Name">

        <textarea name="desc">{{ product.desc }}</textarea>

        <input type="number" step="0.01"
               name="price"
               value="{{ product.price }}">

        <select name="type">
            <option value="0" {% if product.ptype == 0 %}selected{% endif %}>UNSORTED</option>
            <option value="1" {% if product.ptype == 1 %}selected{% endif %}>PREBUILT</option>
            <option value="2" {% if product.ptype == 2 %}selected{% endif %}>HARDWARE</option>
            <option value="3" {% if product.ptype == 3 %}selected{% endif %}>SOFTWARE</option>
            <option value="4" {% if product.ptype == 4 %}selected{% endif %}>ACCESSORY</option>
            <option value="5" {% if product.ptype == 5 %}selected{% endif %}>TOOLS</option>
        </select>

        <input type="text"
               name="image_keyword"
               value="{{ product.image_keyword }}"
               placeholder="Image keyword">

        <button type="submit" class="btn primary">
            Save Changes
        </button>

    </form>

</section>

{% endblock %}
